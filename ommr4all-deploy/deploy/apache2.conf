Listen 8001
<VirtualHost *:8001>
        AllowEncodedSlashes On
        ErrorLog ${APACHE_LOG_DIR}/ommr4all-error.log
        CustomLog ${APACHE_LOG_DIR}/ommr4all-access.log combined

        # websockets are handled by the daphne ASGI service (compose service "ws");
        # on bare metal adjust the host to wherever daphne runs
        ProxyPass /ws ws://ws:8002/ws
        ProxyPassReverse /ws ws://ws:8002/ws

        WSGIPassAuthorization On
        WSGIDaemonProcess ommr4all python-home=/opt/ommr4all/ommr4all-deploy-venv python-path=/opt/ommr4all/ommr4all-deploy/modules/ommr4all-server lang=en_US.UTF-8 locale=en_US.UTF-8
        WSGIProcessGroup ommr4all
        WSGIApplicationGroup %{GLOBAL}

        Alias /static /opt/ommr4all/ommr4all-deploy/modules/ommr4all-server/static
        <Directory /opt/ommr4all/ommr4all-deploy/modules/ommr4all-server/static>
                Require all granted
        </Directory>

        WSGIScriptAlias / /opt/ommr4all/ommr4all-deploy/modules/ommr4all-server/ommr4all/wsgi.py
        <Directory /opt/ommr4all/ommr4all-deploy/modules/ommr4all-server/ommr4all>
                <Files wsgi.py>
                        Require all granted
                </Files>
        </Directory>
</VirtualHost>
