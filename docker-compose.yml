version: '3'
services:
  web:
    image: uniwue/ommr4all
    build: .
    ports:
      - "${PORT}:8001"
    volumes:
      - ${STORAGE}:/opt/ommr4all/storage
    environment:
      # optional LLM providers for the text_llm transcription step;
      # leave empty to offer only the local Chandra model in the client
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_URL=${OPENAI_API_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
    depends_on:
      - migration
  migration:
    image: uniwue/ommr4all
    build: .
    command: bash -c "/opt/ommr4all/ommr4all-deploy-venv/bin/python /opt/ommr4all/ommr4all-deploy/modules/ommr4all-server/manage.py migrate --noinput && chmod 666 /opt/ommr4all/storage/db.sqlite3 && chmod o+w /opt/ommr4all/storage"
    volumes:
      - ${STORAGE}:/opt/ommr4all/storage
  test:
    image: uniwue/ommr4all
    build: .
    profiles:
      - test
    command: bash -c "cd /opt/ommr4all/ommr4all-deploy-src && python3 ommr4all-deploy/test.py"
