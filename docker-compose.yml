version: '3'
services:
  web:
    image: uniwue/ommr4all
    build: .
    ports:
      - "${PORT}:8001"
    volumes:
      - ${STORAGE}:/opt/ommr4all/storage
    depends_on:
      - migration
  migration:
    image: uniwue/ommr4all
    build: .
    command: bash -c "/opt/ommr4all/ommr4all-deploy-venv/bin/python /opt/ommr4all/ommr4all-deploy/modules/ommr4all-server/manage.py migrate --noinput && chmod 666 /opt/ommr4all/storage/db.sqlite3 && chmod o+w /opt/ommr4all/storage"
    volumes:
      - ${STORAGE}:/opt/ommr4all/storage
